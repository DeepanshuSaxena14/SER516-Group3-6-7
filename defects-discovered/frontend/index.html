<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Defect Analyser</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <div>
        <h1>SER516 Analyser</h1>
      </div>
      <div>
        <p>
          Welcome to the SER516 Analyser! Please enter the Github Link to the
          code you want to analyse.
        </p>
      </div>

      <div class="github-form">
        <form>
          <input type="text" id="github-link" name="github_link" required />
          <button type="submit">Analyse</button>
        </form>
        <div
          id="analysis-status"
          class="analysis-status hidden"
          role="status"
          aria-live="polite"
        >
          <span class="spinner" aria-hidden="true"></span>
          <span>Analyzing repository...</span>
        </div>
        <div id="result-placeholder" class="result-placeholder hidden">
          <span class="result-label">Result:</span>
          <a href="#" class="result-link">Add result link here</a>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="index.js"></script>
  </body>
</html>
