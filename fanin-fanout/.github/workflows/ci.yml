name: CI

on: 
  push:
    branches: 
      - "**"
  pull_request:

permissions: 
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Check for Maven
        run: |
          if [ ! -f "pom.xml" ]; then
            echo "No pom.xml found in repository root."
            exit 1
          fi

      - name: Build + Test (Maven)
        run: mvn -B -ntp clean test

